{% extends 'users/base.html' %}

{% block title %}İhale listesi — Obid{% endblock %}

{% block extra_head %}
<link rel="stylesheet" type="text/css" href="https://cdn3.devexpress.com/jslib/23.2.3/css/dx.light.css" />
<script src="https://cdn3.devexpress.com/jslib/23.2.3/js/dx.all.js"></script>
{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="page-header-bar">
        <div>
            <h2 class="h3">İhale listesi</h2>
            <p class="text-muted small mb-0">Tüm kayıtlı ihaleleri arayın ve detaya gidin.</p>
        </div>
        <a href="{% url 'auctions:create' %}" class="btn btn-primary rounded-pill px-4 shadow-sm">
            <i class="bi bi-plus-lg me-1"></i>Yeni ihale oluştur
        </a>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="card-body p-3 bg-white">
            <div class="row g-3 align-items-end mb-4">
                <div class="col-lg-4">
                    <label class="form-label small text-muted">İhale ara</label>
                    <input id="auction-search" type="text" class="form-control" placeholder="Başlık veya açıklama ara...">
                </div>
                <div class="col-md-2 col-lg-2">
                    <label class="form-label small text-muted">Min. başlangıç</label>
                    <input id="min-starting-price" type="number" step="0.01" class="form-control" placeholder="0.00">
                </div>
                <div class="col-md-2 col-lg-2">
                    <label class="form-label small text-muted">Max. başlangıç</label>
                    <input id="max-starting-price" type="number" step="0.01" class="form-control" placeholder="0.00">
                </div>
                <div class="col-md-2 col-lg-2">
                    <label class="form-label small text-muted">Min. mevcut</label>
                    <input id="min-current-price" type="number" step="0.01" class="form-control" placeholder="0.00">
                </div>
                <div class="col-md-2 col-lg-2">
                    <label class="form-label small text-muted">Max. mevcut</label>
                    <input id="max-current-price" type="number" step="0.01" class="form-control" placeholder="0.00">
                </div>
                <div class="col-auto">
                    <button id="search-apply" type="button" class="btn btn-primary rounded-pill px-4">Filtrele</button>
                    <button id="search-reset" type="button" class="btn btn-outline-secondary rounded-pill px-4">Temizle</button>
                </div>
            </div>
            <div id="gridContainer"></div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        function buildQueryParams() {
            var params = new URLSearchParams();
            var searchValue = document.getElementById('auction-search').value.trim();
            var minStart = document.getElementById('min-starting-price').value;
            var maxStart = document.getElementById('max-starting-price').value;
            var minCurrent = document.getElementById('min-current-price').value;
            var maxCurrent = document.getElementById('max-current-price').value;

            if (searchValue) {
                params.set('q', searchValue);
            }
            if (minStart) {
                params.set('min_starting_price', minStart);
            }
            if (maxStart) {
                params.set('max_starting_price', maxStart);
            }
            if (minCurrent) {
                params.set('min_current_price', minCurrent);
            }
            if (maxCurrent) {
                params.set('max_current_price', maxCurrent);
            }
            return params.toString();
        }

        var auctionStore = new DevExpress.data.CustomStore({
            key: "id",
            load: function() {
                var query = buildQueryParams();
                var url = "/auctions/api/tenders/" + (query ? "?" + query : "");
                return fetch(url)
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        return Array.isArray(data) ? data : (data.results || []);
                    });
            }
        });

        var grid = new DevExpress.ui.dxDataGrid(document.getElementById("gridContainer"), {
            dataSource: auctionStore,
            keyExpr: "id",
            remoteOperations: false,
            showBorders: true,
            sorting: { mode: "multiple" },
            paging: { pageSize: 10 },
            pager: {
                showPageSizeSelector: true,
                allowedPageSizes: [5, 10, 20],
                showInfo: true
            },
            columns: [
                { dataField: "id", caption: "ID", width: 50 },
                { dataField: "title", caption: "İhale başlığı" },
                {
                    dataField: "starting_price",
                    caption: "Başlangıç fiyatı",
                    format: { type: "currency", currency: "TRY" }
                },
                {
                    dataField: "current_price",
                    caption: "Mevcut fiyat",
                    format: { type: "currency", currency: "TRY" }
                },
                { dataField: "owner_name", caption: "Açan kurum / kişi" },
                { dataField: "active", caption: "Aktif mi?", dataType: "boolean" },
                {
                    type: "buttons",
                    caption: "İşlem",
                    buttons: [{
                        text: "Teklif ver",
                        icon: "money",
                        onClick: function(e) {
                            window.location.href = "/auctions/" + e.row.data.id + "/";
                        }
                    }]
                }
            ]
        });

        document.getElementById('search-apply').addEventListener('click', function() {
            grid.refresh();
        });

        document.getElementById('search-reset').addEventListener('click', function() {
            document.getElementById('auction-search').value = '';
            document.getElementById('min-starting-price').value = '';
            document.getElementById('max-starting-price').value = '';
            document.getElementById('min-current-price').value = '';
            document.getElementById('max-current-price').value = '';
            grid.refresh();
        });
    });
</script>
{% endblock %}
