{% extends 'users/base.html' %}

{% block content %}
<link rel="stylesheet" href="https://cdn3.devexpress.com/jslib/23.2.3/css/dx.light.css">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://cdn3.devexpress.com/jslib/23.2.3/js/dx.all.js"></script>

<style>
    .sidebar { min-height: 100vh; background: #212529; color: white; padding-top: 20px; }
    .sidebar a { color: #adb5bd; text-decoration: none; display: block; padding: 12px 20px; border-left: 3px solid transparent; cursor: pointer; }
    .sidebar a:hover, .sidebar a.active { background: #343a40; color: white; border-left-color: #0d6efd; }
    .main-content { background: #f8f9fa; padding: 25px; }
    /* Gizleme Sınıfı */
    .content-section { display: none; }
    .content-section.active-section { display: block; }
</style>

<div class="container-fluid p-0">
    <div class="row g-0">
        <div class="col-md-2 sidebar shadow">
            <h5 class="px-4 mb-4 fw-bold text-white text-uppercase small" style="letter-spacing: 1px;">Yönetim</h5>
            <a data-target="section-auctions" class="nav-link active"><i class="bi bi-hammer me-2"></i> İhaleler</a>
            <a data-target="section-users" class="nav-link"><i class="bi bi-people me-2"></i> Kullanıcılar</a>
            <a data-target="section-groups" class="nav-link"><i class="bi bi-shield-lock me-2"></i> Grup & Yetkiler</a>
        </div>

        <div class="col-md-10 main-content">
            <div id="section-auctions" class="content-section active-section">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 class="fw-bold m-0">İhale Yönetimi</h2>
                    <a href="{% url 'auctions:create' %}" class="btn btn-primary shadow-sm rounded-pill px-4">
                        <i class="bi bi-plus-lg me-2"></i>Yeni İhale
                    </a>
                </div>
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-1"><div id="masterGrid"></div></div>
                </div>
            </div>

            <div id="section-users" class="content-section">
                <h2 class="fw-bold mb-4">Kullanıcı Yönetimi</h2>
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-1"><div id="usersGrid"></div></div>
                </div>
            </div>

            <div id="section-groups" class="content-section">
                <h2 class="fw-bold mb-4">Grup ve Menü Yetkileri</h2>
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-1"><div id="groupGrid"></div></div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
$(function() {
    $(".sidebar a.nav-link").click(function(e) {
        e.preventDefault();
        $(".sidebar a.nav-link").removeClass("active");
        $(this).addClass("active");
        
        const targetId = $(this).attr("data-target");
        $(".content-section").removeClass("active-section");
        $("#" + targetId).addClass("active-section");
    });

    const auctions = JSON.parse('{{ auctions_json|safe }}');
    const allBids = JSON.parse('{{ bids_json|safe }}');
    const groups = JSON.parse('{{ groups_json|safe|escapejs }}' || '[]');
    const menus = JSON.parse('{{ menus_json|safe|escapejs }}' || '[]');
    const perms = JSON.parse('{{ perms_json|safe|escapejs }}' || '[]');

    $("#masterGrid").dxDataGrid({ //İhale ve Bid
        dataSource: auctions,
        keyExpr: "id",
        showBorders: true,
        columnAutoWidth: true,
        searchPanel: { visible: true },
        editing: {
            mode: "popup",
            allowUpdating: true,
            allowDeleting: true,
            useIcons: true,
            texts: { confirmDeleteMessage: "Bu ihaleyi silmek istediğinize emin misiniz?" }
        },
        masterDetail: {
            enabled: true,
            template: function(container, options) {
                const currentAuctionId = options.data.id;
                const auctionBids = allBids.filter(b => b.auction_id === currentAuctionId);

                $("<div>")
                    .addClass("p-3 bg-light border-start border-primary border-4")
                    .append("<h6 class='fw-bold mb-3 text-primary'>Teklif Yönetimi</h6>")
                    .append($("<div>").dxDataGrid({
                        dataSource: auctionBids,
                        columns: [
                            { dataField: "user__username", caption: "Teklif Veren", allowEditing: false },
                            { dataField: "amount", caption: "Miktar", format: "currency" },
                            { dataField: "created_at", caption: "Zaman", dataType: "datetime" },
                            {
                                type: "buttons",
                                buttons: [{
                                    icon: "trash",
                                    hint: "Teklifi Sil",
                                    onClick: function(e) {
                                        if(confirm("Bu teklifi silmek istediğinize emin misiniz?")) {
                                            $.ajax({
                                                url: "/auctions/bid/delete/" + e.row.data.id + "/",
                                                type: "POST",
                                                headers: { "X-CSRFToken": "{{ csrf_token }}" },
                                                success: function(res) {
                                                    if (res.success) {
                                                        const deletedId = e.row.data.id;
                                                        const auctionIndex = auctionBids.findIndex(b => b.id === deletedId);
                                                        if (auctionIndex !== -1) auctionBids.splice(auctionIndex, 1);

                                                        const allIndex = allBids.findIndex(b => b.id === deletedId);
                                                        if (allIndex !== -1) allBids.splice(allIndex, 1);
                                                        
                                                        e.component.refresh();
                                                    } else {
                                                        alert("Silme hatası: " + res.error);
                                                    }
                                                },
                                                error: function() {
                                                    alert("Sunucuya bağlanılamadı.");
                                                }
                                            });
                                        }
                                    }
                                }]
                            }
                        ]
                    }))
                    .appendTo(container);
            }
        },
        columns: [
            { dataField: "id", caption: "ID", width: 50, allowEditing: false },
            { dataField: "owner__username", caption: "Sahibi", width: 120, allowEditing: false },
            { dataField: "title", caption: "İhale Başlığı", validationRules: [{ type: "required" }] },
            { dataField: "description", caption: "Açıklama", visible: false, editCellTemplate: function(container, cellInfo) {
                return $("<textarea>").addClass("dx-texteditor-input").val(cellInfo.value).on("change", function(e) {
                    cellInfo.setValue($(this).val());
                });
            }},
            { dataField: "current_price", caption: "Fiyat", format: "currency", allowEditing: false },
            { dataField: "created_at", caption: "Başlatılma", dataType: "datetime", format: "dd/MM/yy HH:mm", allowEditing: false },
            { dataField: "end_time", caption: "Bitiş Tarihi", dataType: "datetime", format: "dd/MM/yy HH:mm" },
            { dataField: "active", caption: "Aktif mi?", dataType: "boolean", width: 80 }
        ],
        onRowUpdating: function(e) {
                const deferred = $.Deferred(); // Grid'in işlem sonucunu beklemesi için
                const auctionId = e.key;
                const updatedData = e.newData;

                $.ajax({
                        url: "/auctions/update/" + auctionId + "/",
                        type: "POST",
                        contentType: "application/json",
                        data: JSON.stringify(updatedData),
                        headers: { "X-CSRFToken": "{{ csrf_token }}" },
                        success: function(res) {
                            if(res.success) {
                                deferred.resolve(); // Başarılıysa hücreyi güncelle
                            } else {
                                alert("Güncelleme Hatası: " + res.error);
                                deferred.reject(); // Başarısızsa değişikliği geri al
                            }
                        },
                        error: function() {
                            alert("Sunucuya bağlanılamadı.");
                            deferred.reject();
                        }
                });

                e.cancel = deferred.promise(); // İşlem bitene kadar grid'i "bekle" moduna alır
                }
    });
    $("#groupGrid").dxDataGrid({
        dataSource: groups,
        keyExpr: "id",
        showBorders: true,
        columnAutoWidth: true,
        editing: {
            mode: "row",
            allowAdding: true,
            allowUpdating: true,
            allowDeleting: true,
            useIcons: true,
            texts: { confirmDeleteMessage: "Bu grubu silmek istediğinize emin misiniz?" },
        },
        columns: [
            { dataField: "name", caption: "Grup Adı", validationRules: [{ type: "required" }] }
        ],
        // GRUP AJAX İŞLEMLERİ
        onRowInserting: function(e) {
            const deferred = $.Deferred();
            $.ajax({
                url: "/api/group/add/", // urls.py yapına göre yolu düzelt
                type: "POST", contentType: "application/json",
                data: JSON.stringify(e.data), headers: { "X-CSRFToken": "{{ csrf_token }}" },
                success: function(res) {
                    if(res.success) { e.data.id = res.id; deferred.resolve(); } 
                    else { deferred.reject("Hata: " + res.error); }
                }, error: function() { deferred.reject("Bağlantı hatası"); }
            });
            e.cancel = deferred.promise();
        },
        onRowUpdating: function(e) {
            const deferred = $.Deferred();
            $.ajax({
                url: "/api/group/update/" + e.key + "/",
                type: "POST", contentType: "application/json",
                data: JSON.stringify(e.newData), headers: { "X-CSRFToken": "{{ csrf_token }}" },
                success: function(res) { res.success ? deferred.resolve() : deferred.reject("Hata"); },
                error: function() { deferred.reject("Sunucu hatası"); }
            });
            e.cancel = deferred.promise();
        },
        onRowRemoving: function(e) {
            const deferred = $.Deferred();
            $.ajax({
                url: "/api/group/delete/" + e.key + "/",
                type: "POST", headers: { "X-CSRFToken": "{{ csrf_token }}" },
                success: function(res) { res.success ? deferred.resolve() : deferred.reject("Hata"); },
                error: function() { deferred.reject("Sunucu hatası"); }
            });
            e.cancel = deferred.promise();
        },

        masterDetail: {
            enabled: true,
            template: function(container, options) {
                const currentGroupId = options.data.id;
                const groupPermissions = perms.filter(p => p.group_id === currentGroupId);

                $("<div>")
                    .addClass("p-3 bg-light border-start border-success border-4")
                    .append("<h6 class='fw-bold mb-3 text-success'>" + options.data.name + " Menü Yetkileri</h6>")
                    .append($("<div>").dxDataGrid({
                        dataSource: groupPermissions,
                        keyExpr: "id",
                        showBorders: true,
                        editing: {
                            mode: "row",
                            allowAdding: true, allowUpdating: true, allowDeleting: true, useIcons: true
                        },
                        columns: [
                            {
                                dataField: "menu_id", caption: "Menü Seçimi",
                                lookup: { dataSource: menus, valueExpr: "id", displayExpr: "title" },
                                validationRules: [{ type: "required" }]
                            },
                            { dataField: "can_view", caption: "Görebilir mi?", dataType: "boolean" }
                        ],
                        // YETKİ AJAX İŞLEMLERİ
                        onRowInserting: function(e) {
                            const deferred = $.Deferred();
                            e.data.group_id = currentGroupId; // Hangi gruba eklendiğini belirtiyoruz
                            $.ajax({
                                url: "/api/perm/add/",
                                type: "POST", contentType: "application/json",
                                data: JSON.stringify(e.data), headers: { "X-CSRFToken": "{{ csrf_token }}" },
                                success: function(res) {
                                    if(res.success) { e.data.id = res.id; deferred.resolve(); }
                                    else { deferred.reject("Hata"); }
                                }, error: function() { deferred.reject("Hata"); }
                            });
                            e.cancel = deferred.promise();
                        },
                        onRowUpdating: function(e) {
                            const deferred = $.Deferred();
                            $.ajax({
                                url: "/api/perm/update/" + e.key + "/",
                                type: "POST", contentType: "application/json",
                                data: JSON.stringify(e.newData), headers: { "X-CSRFToken": "{{ csrf_token }}" },
                                success: function(res) { res.success ? deferred.resolve() : deferred.reject(); },
                                error: function() { deferred.reject(); }
                            });
                            e.cancel = deferred.promise();
                        },
                        onRowRemoving: function(e) {
                            const deferred = $.Deferred();
                            $.ajax({
                                url: "/api/perm/delete/" + e.key + "/",
                                type: "POST", headers: { "X-CSRFToken": "{{ csrf_token }}" },
                                success: function(res) { res.success ? deferred.resolve() : deferred.reject(); },
                                error: function() { deferred.reject(); }
                            });
                            e.cancel = deferred.promise();
                        }
                    }))
                    .appendTo(container);
            }
        }
    });
});
</script>
{% endblock %}
