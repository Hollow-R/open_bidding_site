{% extends 'users/base.html' %}

{% block content %}
<div class="container-fluid mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark">Sistem Yönetim Paneli</h2>
        <a href="{% url 'auctions:create' %}" class="btn btn-primary">
            <i class="bi bi-plus-lg"></i> Yeni İhale Ekle
        </a>
    </div>

    <div class="card shadow-sm border-0 rounded-3">
        <div class="card-body">
            <div id="adminGrid"></div>
        </div>
    </div>
</div>

<script>
    $(function() {
        const auctionData = [
            {% for a in auctions %}
            {
                id: {{ a.id }},
                title: "{{ a.title|escapejs }}",
                owner: "{{ a.owner.username }}",
                price: {{ a.current_price }},
                end_time: "{{ a.end_time|date:'Y-m-d H:i' }}",
                is_active: {{ a.active|yesno:"true,false" }}
            },
            {% endfor %}
        ];

        $("#adminGrid").dxDataGrid({
            dataSource: auctionData,
            showBorders: true,
            filterRow: { visible: true }, // Filtreleme satırı
            searchPanel: { visible: true }, // Arama çubuğu
            paging: { pageSize: 10 }, // Sayfalama
            columns: [
                { dataField: "id", caption: "ID", width: 50 },
                { dataField: "title", caption: "İhale Başlığı" },
                { dataField: "owner", caption: "Oluşturan" },
                { dataField: "price", caption: "Güncel Fiyat", dataType: "number", format: "fixedPoint" },
                { dataField: "end_time", caption: "Bitiş Tarihi", dataType: "datetime" },
                { 
                    dataField: "is_active", 
                    caption: "Durum",
                    cellTemplate: function(container, options) {
                        const badgeClass = options.value ? "bg-success" : "bg-danger";
                        const text = options.value ? "Aktif" : "Pasif";
                        $("<span class='badge " + badgeClass + "'>").text(text).appendTo(container);
                    }
                },
                {
                    type: "buttons",
                    buttons: [{
                        hint: "Düzenle",
                        icon: "edit",
                        onClick: function(e) {
                            window.location.href = "/auctions/edit/" + e.row.data.id + "/";
                        }
                    }]
                }
            ]
        });
    });
</script>
{% endblock %}
